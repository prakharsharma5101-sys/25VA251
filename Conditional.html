<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Conditional Statements in JS</title>
</head>
<body>
    <script>
     // switch.....
     let grade='C';
     switch(grade) {
        case 'A':result="First Division";
            break;
        case 'B':result="Second Division";
            break;
        case 'C':result="Third Division";
            break;
        default:result="Fail";
     }
     console.log(result);

     //if else if else......
        let marks=85;
        if(marks>=60) {
            console.log("First Grade");
        } else if(marks<=60&&marks>=40) {
            console.log("Second Grade");
        } else if(marks<=40&&marks>=30) {
            console.log("Third Grade");
        } else {
            console.log("Fail");
        }
     </script>
</body>
</html>
