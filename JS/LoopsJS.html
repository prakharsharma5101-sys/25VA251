<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Loops in JS</title>
</head>
<body>
    <script>
        // Loops - A block of code that is repeated until a specified condition is met
        // Types of loops in JS - for loop, while loop, do while loop, for in loop, for of loop
        // For Loop - A loop that is used to repeat a block of code a specified number of times
        // Syntax - for(initialization; condition; increment/decrement) { // code to be executed }
        for(let i=0; i<5; i++) {
            console.log(i);
        }
        // While Loop - A loop that is used to repeat a block of code as long as a specified condition is true
        // Syntax - while(condition) { // code to be executed }
        let j=0;
        while(j<5) {
            console.log(j);
            j++;
        }
        // Do While Loop - A loop that is used to repeat a block of code at least once and then continue to repeat as long as a specified condition is true
        // Syntax - do { // code to be executed } while(condition)
        let k=0;
        do {
            console.log(k);
            k++;
        } while(k<5);
    </script>
</body>
</html>
